{% extends 'layout.html' %}
{% block title %}Book Appointment{% endblock %}

{% block body %}
<div class="book-page">

  <div class="section-header">
    <div class="section-tag">📅 Appointment</div>
    <h2 class="section-title">Book a <span>Consultation</span></h2>
    <p class="section-sub">Fill in your details and choose your preferred doctor and time.</p>
  </div>

  <div class="book-card">
    <form method="POST">

      <h3 style="font-family:'Playfair Display',serif; color:var(--navy); margin-bottom:24px; font-size:20px;">
        Personal Information
      </h3>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Your Email</label>
          <input class="form-control" type="email" name="email"
                 value="{{ current_user.email }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-control" type="text" name="name"
                 value="{{ current_user.username }}" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Gender</label>
          <select class="form-control" name="gender" required>
            <option value="">Select gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number (11 digits)</label>
          <input class="form-control" type="text" name="number"
                 placeholder="01XXXXXXXXX" maxlength="11" required>
        </div>
      </div>

      <hr style="border:none; border-top:1px solid rgba(10,22,40,0.08); margin:28px 0;">

      <h3 style="font-family:'Playfair Display',serif; color:var(--navy); margin-bottom:24px; font-size:20px;">
        Appointment Details
      </h3>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Select Doctor</label>
          <select class="form-control" name="did" required>
            <option value="">Choose a doctor</option>
            {% for doc in doctors %}
            <option value="{{ doc.did }}">
              Dr. {{ doc.doctorname }} — {{ doc.department.dept_name }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Disease / Condition</label>
          <select class="form-control" name="disease_id" required>
            <option value="">Select condition</option>
            {% for d in diseases %}
            <option value="{{ d.disease_id }}">{{ d.disease_name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Preferred Slot</label>
          <select class="form-control" name="slot" required>
            <option value="">Select time slot</option>
            <option value="Morning">🌅 Morning (8am – 12pm)</option>
            <option value="Evening">🌆 Evening (4pm – 8pm)</option>
            <option value="Night">🌙 Night (8pm – 11pm)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Appointment Date</label>
          <input class="form-control" type="date" name="date" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Appointment Time</label>
        <input class="form-control" type="time" name="time" required>
      </div>

      <div style="display:flex; gap:16px; margin-top:32px;">
        <button type="submit" class="btn btn-primary">✅ Confirm Booking</button>
        <a href="/patient/dashboard" class="btn btn-outline" style="color:var(--navy); border-color:rgba(10,22,40,0.2);">
          Cancel
        </a>
      </div>

    </form>
  </div>

</div>
{% endblock %}
