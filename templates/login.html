{% extends 'layout.html' %}
{% block title %}Login{% endblock %}

{% block body %}
<div class="form-page">

  <!-- Visual Side -->
  <div class="form-visual">
    <img src="https://images.unsplash.com/photo-1538108149393-fbbd81895907?w=900&q=80" alt="Hospital">
    <div class="form-visual-overlay">
      <div class="form-visual-title">Welcome<br>Back.</div>
      <p class="form-visual-sub">
        Access your appointments, health records,<br>and medical team — all in one secure place.
      </p>
    </div>
  </div>

  <!-- Form Side -->
  <div class="form-side">
    <div class="form-logo">
      <div class="logo-icon">M</div>
      <div class="logo-text" style="font-family:'Playfair Display',serif; color: var(--navy);">MediCare</div>
    </div>

    <h2 class="form-heading">Sign In</h2>
    <p class="form-subheading">Enter your credentials to continue.</p>

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-control" type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" placeholder="••••••••" required>
      </div>
      <div style="margin-top: 28px;">
        <button type="submit" class="btn btn-primary btn-full">Sign In →</button>
      </div>
    </form>

    <p class="form-link">
      Don't have an account? <a href="/signup">Create one free</a>
    </p>
  </div>

</div>
{% endblock %}
